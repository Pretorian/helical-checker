<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple AR Angle</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; position: fixed; width: 100%; height: 100%; }
        
        /* Video stays in background */
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        
        /* Canvas stays on top of video */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        /* Transparent layer to catch ALL taps */
        #touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: rgba(0,0,0,0); }

        #info { 
            position: absolute; top: 30px; width: 100%; text-align: center; 
            color: white; font-size: 22px; font-weight: bold; 
            text-shadow: 2px 2px 4px #000; z-index: 15; pointer-events: none;
        }
        .center-dot { 
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; 
            background: red; border-radius: 50%; transform: translate(-50%, -50%); 
            z-index: 15; border: 2px solid white; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="info">TAP ANYWHERE: Set Point 1</div>
    <div class="center-dot"></div>
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
    <div id="touch-layer"></div>

    <script>
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        const info = document.getElementById('info');
        const touchLayer = document.getElementById('touch-layer');

        let p1 = null; 
        let p2 = null; 
        let step = 0;

        // 1. Camera setup
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { v.srcObject = stream; })
            .catch(err => { info.innerText = "Camera Error: " + err; });

        function resize() {
            c.width = window.innerWidth;
            c.height = window.innerHeight;
        }

        // 2. The Logic Fix: Listening to the touch-layer specifically
        touchLayer.addEventListener('pointerdown', (e) => {
            // We use the center of the screen as the measurement point
            const x = window.innerWidth / 2;
            const y = window.innerHeight / 2;

            if (step === 0) {
                p1 = { x, y };
                step = 1;
                info.innerText = "TAP ANYWHERE: Set Point 2";
            } else if (step === 1) {
                p2 = { x, y };
                step = 2;
            } else {
                p1 = null; p2 = null; step = 0;
                info.innerText = "TAP ANYWHERE: Set Point 1";
            }
        });

        // 3. Drawing the Triangle
        function draw() {
            ctx.clearRect(0, 0, c.width, c.height);
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;

            if (p1) {
                // Point 1
                ctx.fillStyle = "red";
                ctx.beginPath(); ctx.arc(p1.x, p1.y, 10, 0, Math.PI*2); ctx.fill();

                if (p2) {
                    // Point 2
                    ctx.beginPath(); ctx.arc(p2.x, p2.y, 10, 0, Math.PI*2); ctx.fill();

                    // Triangle
                    ctx.fillStyle = "rgba(0, 255, 0, 0.3)";
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.lineTo(cx, cy);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    // Angle Math at P1
                    const a1 = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                    const a2 = Math.atan2(cy - p1.y, cx - p1.x);
                    let deg = Math.abs((a2 - a1) * 180 / Math.PI);
                    if (deg > 180) deg = 360 - deg;

                    info.innerText = deg.toFixed(1) + "°";
                    
                    // Small text label at the vertex
                    ctx.fillStyle = "white";
                    ctx.font = "20px Arial";
                    ctx.fillText(deg.toFixed(1) + "°", p1.x + 15, p1.y - 15);
                } else {
                    // Guide line before second tap
                    ctx.strokeStyle = "yellow";
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(cx, cy);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
</body>
</html>
