<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3-Tap AR Triangle</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; position: fixed; width: 100%; height: 100%; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        /* Transparent layer to catch taps at specific screen coordinates */
        #touch-surface { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        #hud { 
            position: absolute; top: 40px; width: 100%; text-align: center; 
            color: white; font-size: 22px; font-weight: bold; text-shadow: 2px 2px 8px #000; z-index: 15; pointer-events: none;
        }
        #controls {
            position: absolute; bottom: 30px; width: 100%; display: flex; 
            justify-content: center; z-index: 20;
        }
        .btn {
            padding: 15px 30px; background: #ff3b30; color: white; border-radius: 30px;
            border: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="hud">Tap 1: Set Corner (Vertex)</div>
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
    <div id="touch-surface"></div>
    
    <div id="controls">
        <button id="reset-btn" class="btn">Clear & Reset</button>
    </div>

    <script>
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        const hud = document.getElementById('hud');
        
        let points = []; // Array to store {x, y} coordinates

        // 1. Camera Access
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => v.srcObject = s)
            .catch(err => hud.innerText = "Camera error. Use HTTPS.");

        // 2. Handle Taps at specific coordinates
        document.getElementById('touch-surface').addEventListener('pointerdown', (e) => {
            if (points.length >= 3) return; // Wait for reset

            // Get exact coordinates of the tap
            const rect = v.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            points.push({ x, y });

            if (points.length === 1) hud.innerText = "Tap 2: Set Baseline End";
            else if (points.length === 2) hud.innerText = "Tap 3: Set Angle End";
            else if (points.length === 3) hud.innerText = "Triangle Complete";
        });

        document.getElementById('reset-btn').onclick = () => {
            points = [];
            hud.innerText = "Tap 1: Set Corner (Vertex)";
        };

        function draw() {
            ctx.clearRect(0, 0, c.width, c.height);
            
            // Draw points and connections
            ctx.lineWidth = 3;
            ctx.strokeStyle = "white";
            
            points.forEach((p, i) => {
                ctx.fillStyle = i === 0 ? "red" : "white"; // Corner is red
                ctx.beginPath();
                ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
                ctx.fill();
            });

            if (points.length >= 2) {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                ctx.lineTo(points[1].x, points[1].y);
                ctx.stroke();
            }

            if (points.length === 3) {
                // Draw the full triangle
                ctx.beginPath();
                ctx.moveTo(points[1].x, points[1].y);
                ctx.lineTo(points[2].x, points[2].y);
                ctx.lineTo(points[0].x, points[0].y);
                ctx.fillStyle = "rgba(0, 255, 0, 0.3)";
                ctx.fill();
                ctx.stroke();

                // Calculate the angle at Points[0] (the vertex)
                const p1 = points[0];
                const p2 = points[1];
                const p3 = points[2];

                const angle1 = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                const angle2 = Math.atan2(p3.y - p1.y, p3.x - p1.x);
                
                let deg = Math.abs((angle2 - angle1) * 180 / Math.PI);
                if (deg > 180) deg = 360 - deg;

                // Display result
                hud.innerText = "Result: " + deg.toFixed(1) + "°";
                ctx.fillStyle = "white";
                ctx.font = "bold 24px Arial";
                ctx.fillText(deg.toFixed(1) + "°", p1.x + 20, p1.y - 20);
            }

            requestAnimationFrame(draw);
        }

        window.onresize = () => { c.width = window.innerWidth; c.height = window.innerHeight; };
        window.onresize();
        draw();
    </script>
</body>
</html>
