<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Protractor Prototype</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; width: 90%; }
        .btn { background: rgba(255,255,255,0.8); border: none; padding: 15px 25px; border-radius: 30px; font-size: 16px; font-weight: bold; margin: 5px; }
        #hud { position: absolute; top: 40px; width: 100%; text-align: center; color: white; text-shadow: 2px 2px 4px #000; font-size: 24px; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="crosshair"></div>
    
    <div id="hud">Tap to set Vertex</div>
    
    <div id="ui">
        <button class="btn" onclick="handleAction()">Next Step</button>
        <button class="btn" style="background: rgba(255,0,0,0.6); color: white;" onclick="reset()">Reset</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');

        let step = 0; // 0: Vertex, 1: Baseline, 2: Measuring
        let vertex = null;
        let baseline = null;
        let currentMouse = { x: 0, y: 0 };

        // Initialize Camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera error: " + err);
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function handleAction() {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            if (step === 0) {
                vertex = { x: centerX, y: centerY };
                step = 1;
                hud.innerText = "Aim at 0° line and tap Next";
            } else if (step === 1) {
                baseline = { x: centerX, y: centerY };
                step = 2;
                hud.innerText = "Measuring Angle...";
            }
        }

        function reset() {
            step = 0;
            vertex = null;
            baseline = null;
            hud.innerText = "Tap to set Vertex";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            ctx.lineWidth = 3;
            ctx.setLineDash([]);

            if (vertex) {
                // Draw Vertex
                ctx.fillStyle = "red";
                ctx.beginPath();
                ctx.arc(vertex.x, vertex.y, 8, 0, Math.PI * 2);
                ctx.fill();

                // Draw Line to current crosshair
                ctx.strokeStyle = "yellow";
                ctx.beginPath();
                ctx.moveTo(vertex.x, vertex.y);
                ctx.lineTo(centerX, centerY);
                ctx.stroke();

                if (baseline) {
                    // Draw Baseline
                    ctx.strokeStyle = "white";
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(vertex.x, vertex.y);
                    ctx.lineTo(baseline.x, baseline.y);
                    ctx.stroke();

                    // Calculate Angle
                    const angle1 = Math.atan2(baseline.y - vertex.y, baseline.x - vertex.x);
                    const angle2 = Math.atan2(centerY - vertex.y, centerX - vertex.x);
                    let diff = (angle2 - angle1) * 180 / Math.PI;
                    
                    // Normalize to 0-180
                    diff = Math.abs(diff);
                    if (diff > 180) diff = 360 - diff;
                    
                    hud.innerText = diff.toFixed(1) + "°";
                    
                    // Draw Arc
                    ctx.setLineDash([]);
                    ctx.beginPath();
                    ctx.strokeStyle = "rgba(0, 255, 0, 0.5)";
                    ctx.lineWidth = 20;
                    ctx.arc(vertex.x, vertex.y, 50, angle1, angle2, (angle2 < angle1));
                    ctx.stroke();
                }
            }

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize();
        startCamera();
        draw();
    </script>
</body>
</html>
