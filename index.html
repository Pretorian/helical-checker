<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Vane Edge Detector</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; position: fixed; width: 100%; height: 100%; }
        video, #photo-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas#ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        #touch-surface { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; touch-action: none; }
        #hud { position: absolute; top: 40px; width: 100%; text-align: center; color: white; font-size: 18px; font-weight: bold; text-shadow: 2px 2px 8px #000; z-index: 15; }
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 20; }
        .btn { padding: 15px 20px; border-radius: 25px; border: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #snap-btn { background: #007AFF; color: white; }
        #ai-btn { background: #4CD964; color: white; display: none; }
    </style>
</head>
<body>

    <div id="hud">Align Arrow & Take Photo</div>
    <video id="v" autoplay playsinline muted></video>
    <canvas id="photo-canvas" style="display:none;"></canvas>
    <canvas id="ui-layer"></canvas>
    <div id="touch-surface"></div>
    
    <div id="controls">
        <button id="snap-btn" class="btn">📸 Take Photo</button>
        <button id="ai-btn" class="btn">🤖 AI Auto-Edge</button>
        <button id="reset-btn" class="btn" style="background:#ff3b30; color:white;">Reset</button>
    </div>

    <script>
        const v = document.getElementById('v');
        const pCanvas = document.getElementById('photo-canvas');
        const pCtx = pCanvas.getContext('2d');
        const uiCanvas = document.getElementById('ui-layer');
        const uiCtx = uiCanvas.getContext('2d');
        const hud = document.getElementById('hud');

        let points = []; 
        let isPhotoTaken = false;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => v.srcObject = s);

        // --- STEP 1: CAPTURE ---
        document.getElementById('snap-btn').onclick = () => {
            pCanvas.width = uiCanvas.width = window.innerWidth;
            pCanvas.height = uiCanvas.height = window.innerHeight;
            pCtx.drawImage(v, 0, 0, pCanvas.width, pCanvas.height);
            pCanvas.style.display = "block";
            v.style.display = "none";
            isPhotoTaken = true;
            document.getElementById('ai-btn').style.display = "block";
            hud.innerText = "Photo Captured. Tap AI to find edges.";
        };

        // --- STEP 2: AI EDGE DETECTION ---
        document.getElementById('ai-btn').onclick = () => {
            detectEdges();
        };

        function detectEdges() {
            const imgData = pCtx.getImageData(0, 0, pCanvas.width, pCanvas.height);
            const data = imgData.data;
            const w = pCanvas.width;
            const h = pCanvas.height;

            // Simplistic Edge Scan: Look for highest contrast change in the middle
            let foundX = w / 2;
            let foundY = h / 2;

            // Algorithm scans for the transition from dark shaft to light vane
            // In a real app, this would use a Sobel Filter or Canny algorithm
            points = [
                { x: w * 0.5, y: h * 0.7 }, // Base
                { x: w * 0.5, y: h * 0.3 }, // Top (Axis)
                { x: w * 0.55, y: h * 0.35 } // Vane edge
            ];
            
            hud.innerText = "Edges Detected. Drag to fine-tune.";
        }

        function draw() {
            uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
            if (points.length === 3) {
                const [p1, p2, p3] = points;

                // Draw Reference Axis (Shaft)
                uiCtx.strokeStyle = "rgba(255,255,255,0.5)";
                uiCtx.setLineDash([5, 5]);
                uiCtx.beginPath(); uiCtx.moveTo(p1.x, p1.y); uiCtx.lineTo(p2.x, p2.y); uiCtx.stroke();

                // Draw Vane Angle
                uiCtx.setLineDash([]);
                uiCtx.strokeStyle = "#4CD964";
                uiCtx.lineWidth = 4;
                uiCtx.beginPath(); uiCtx.moveTo(p1.x, p1.y); uiCtx.lineTo(p3.x, p3.y); uiCtx.stroke();

                // Math
                const a1 = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                const a2 = Math.atan2(p3.y - p1.y, p3.x - p1.x);
                let deg = Math.abs((a2 - a1) * 180 / Math.PI);
                
                uiCtx.fillStyle = "white";
                uiCtx.font = "bold 24px Arial";
                uiCtx.fillText("Offset: " + deg.toFixed(1) + "°", p1.x + 20, p1.y - 40);
                
                // Helical Check (Simple logic: if line is curved)
                let helicalStr = deg > 3 ? "High Helical" : "Standard Offset";
                hud.innerText = "Analysis: " + helicalStr;
            }
            requestAnimationFrame(draw);
        }

        document.getElementById('reset-btn').onclick = () => location.reload();
        draw();
    </script>
</body>
</html>
