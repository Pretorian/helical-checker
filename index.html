<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple AR Angle</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        #info { 
            position: absolute; top: 20px; width: 100%; text-align: center; 
            color: white; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px #000;
        }
        .dot { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: red; border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body onclick="handleTap()">

    <div id="info">Tap 1: Set Center Point</div>
    <div class="dot"></div>
    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        const info = document.getElementById('info');

        let p1 = null; // Vertex
        let p2 = null; // Baseline
        let currentStep = 0;

        // Start Camera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => v.srcObject = s);

        function resize() {
            c.width = window.innerWidth;
            c.height = window.innerHeight;
        }

        function handleTap() {
            const x = window.innerWidth / 2;
            const y = window.innerHeight / 2;

            if (currentStep === 0) {
                p1 = { x, y };
                currentStep = 1;
                info.innerText = "Tap 2: Set Baseline";
            } else if (currentStep === 1) {
                p2 = { x, y };
                currentStep = 2;
                info.innerText = "Measuring...";
            } else {
                // Reset on third tap
                p1 = null; p2 = null; currentStep = 0;
                info.innerText = "Tap 1: Set Center Point";
            }
        }

        function draw() {
            ctx.clearRect(0, 0, c.width, c.height);
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;

            if (p1) {
                // Draw point 1
                ctx.fillStyle = "red";
                ctx.beginPath(); ctx.arc(p1.x, p1.y, 8, 0, 7); ctx.fill();

                if (p2) {
                    // Draw point 2
                    ctx.beginPath(); ctx.arc(p2.x, p2.y, 8, 0, 7); ctx.fill();

                    // Draw Triangle (P1 to P2 to Current Center)
                    ctx.fillStyle = "rgba(0, 255, 0, 0.3)";
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.lineTo(cx, cy);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    // Calculate Angle at P1
                    const a1 = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                    const a2 = Math.atan2(cy - p1.y, cx - p1.x);
                    let deg = Math.abs((a2 - a1) * 180 / Math.PI);
                    if (deg > 180) deg = 360 - deg;

                    info.innerText = deg.toFixed(1) + "°";
                } else {
                    // Line showing where the baseline will go
                    ctx.strokeStyle = "yellow";
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(cx, cy);
                    ctx.stroke();
                }
            }
            requestAnimationFrame(draw);
        }

        window.onresize = resize;
        resize();
        draw();
    </script>
</body>
</html>
